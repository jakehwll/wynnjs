name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test, typecheck, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Typecheck examples
        run: bun run typecheck:examples

      - name: Verify package contents
        run: npm pack --dry-run --workspaces

  consumer-check:
    name: Node consumer smoke test
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build package
        run: |
          bun install --frozen-lockfile
          bun run build
          npm pack --workspaces

      - name: Install tarball and import
        run: |
          mkdir /tmp/consumer
          cd /tmp/consumer
          npm init -y
          npm install "${{ github.workspace }}/wynnjs-api-"*.tgz zod@^4.4.0
          node -e "const { WynnClient, API_BASE_URL } = require('@wynnjs/api'); if (typeof WynnClient !== 'function') throw new Error('CJS import failed'); console.log(API_BASE_URL);"
          node --input-type=module -e "import { WynnClient } from '@wynnjs/api'; if (typeof WynnClient !== 'function') throw new Error('ESM import failed');"
