name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Typecheck examples
        run: bun run typecheck:examples

      - name: Verify package contents
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package.json
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")

          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Release tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          node --version
          npm --version
          NPM_VERSION=$(npm --version | cut -d. -f1)
          if [ "$NPM_VERSION" -lt 11 ]; then
            echo "npm 11.5.1+ is required for trusted publishing"
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance --access public
